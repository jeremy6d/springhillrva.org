<form class="contact-form" action="{{ site.formspree_endpoint }}" method="POST">
  <input type="hidden" name="_subject" value="Springhill RVA contact form">

  <div class="form-field">
    <label for="contact-name">Name</label>
    <input type="text" id="contact-name" name="name" required autocomplete="name">
  </div>

  <div class="form-field">
    <label for="contact-email">Email</label>
    <input type="email" id="contact-email" name="email" required autocomplete="email">
  </div>

  <div class="form-field">
    <label for="contact-phone">Phone</label>
    <input type="tel" id="contact-phone" name="phone" autocomplete="tel">
  </div>

  <div class="form-field">
    <label for="contact-address">Address</label>
    <input type="text" id="contact-address" name="address" autocomplete="street-address" placeholder="Street address (optional)">
  </div>

  <div class="form-field">
    <label for="contact-message">Message</label>
    <textarea id="contact-message" name="message" rows="6" required></textarea>
  </div>

  <button type="submit" class="btn-primary">Send message</button>
</form>
