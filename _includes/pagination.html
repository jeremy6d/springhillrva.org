{% if paginator.total_pages > 1 %}
<nav class="pagination" aria-label="Pagination">
  {% if paginator.previous_page %}
    <a class="pagination-prev" href="{{ paginator.previous_page_path | relative_url }}">&larr; Newer</a>
  {% endif %}
  <span class="pagination-info">Page {{ paginator.page }} of {{ paginator.total_pages }}</span>
  {% if paginator.next_page %}
    <a class="pagination-next" href="{{ paginator.next_page_path | relative_url }}">Older &rarr;</a>
  {% endif %}
</nav>
{% endif %}
